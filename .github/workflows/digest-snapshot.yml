name: Daily pin snapshot (累積頻道精選)

# Records each channel's currently-pinned articles into state/channel_pins.json
# every day. Matters' API exposes only the *current* pin (no history), so this
# daily accumulation is how the monthly digest can list every article pinned
# during the month — including ones already rotated out.

on:
  schedule:
    # Every day 23:00 UTC = 07:00 Hong Kong time.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  STATE_FILE: state/channel_pins.json

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Snapshot today's channel pins
        run: python -m bot.digest --type snapshot --state "$STATE_FILE"

      - name: Commit updated pin state
        run: |
          git add "$STATE_FILE"
          if git diff --cached --quiet -- "$STATE_FILE"; then
            echo "$STATE_FILE unchanged"; exit 0
          fi
          git config user.name "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git commit -m "chore: pin snapshot ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          for attempt in 1 2 3; do
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push attempt $attempt rejected; rebasing"
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts"; exit 1
